<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Customer Tip Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }

    h2 {
      margin-bottom: 10px;
    }

    #status {
      margin-bottom: 12px;
      padding: 10px 14px;
      background: #f3f4f6;
      border-radius: 10px;
      font-size: 14px;
    }

    #map {
      height: 80vh;
      width: 100%;
      border-radius: 12px;
    }

    .info-window {
      max-width: 260px;
      font-size: 14px;
      line-height: 1.4;
    }

    .info-window h3 {
      margin: 0 0 8px 0;
      font-size: 16px;
    }

    .info-window .address {
      margin-bottom: 8px;
      color: #444;
    }

    .info-window .customer {
      margin-bottom: 4px;
    }
  </style>
</head>
<body>
  <h2>Customer Tip Map</h2>
  <div id="status">Loading map...</div>
  <div id="map"></div>

  <script>
    function setStatus(text) {
      document.getElementById("status").textContent = text;
      console.log(text);
    }

    function loadGoogleMaps() {
      const script = document.createElement("script");
      script.src = "https://maps.googleapis.com/maps/api/js?key=AIzaSyDECF7ZPTKhkDOtwzWOWL4nEtqlXxsnLI4&v=weekly";
      script.async = true;
      script.defer = true;
      script.onload = initMap;
      document.head.appendChild(script);
    }

    function buildInfoWindowContent(location) {
      const customerLines = location.customers
        .map(c => {
          const avg = Number(c.average_tip || 0).toFixed(2);
          return `<div class="customer"><strong>${escapeHtml(c.name)}</strong> — $${avg}</div>`;
        })
        .join("");

      return `
        <div class="info-window">
          <h3>${location.customers.length} Customer${location.customers.length === 1 ? "" : "s"}</h3>
          <div class="address">${escapeHtml(location.address)}</div>
          ${customerLines}
        </div>
      `;
    }

    function escapeHtml(text) {
      return String(text).replace(/[&<>"']/g, function (match) {
        const escapeMap = {
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          "\"": "&quot;",
          "'": "&#039;"
        };
        return escapeMap[match];
      });
    }

    async function initMap() {
      setStatus("Map loaded. Loading precomputed coordinates...");

      const map = new google.maps.Map(document.getElementById("map"), {
        center: { lat: 44.091, lng: -87.657 },
        zoom: 12
      });

      let locations = [];

      try {
        const response = await fetch("data/Customers6_geocoded.json");
        if (!response.ok) {
          throw new Error("Failed to fetch Customers6_geocoded.json: " + response.status);
        }

        locations = await response.json();
        setStatus(`Loaded ${locations.length} geocoded address groups.`);
        console.log("Geocoded locations:", locations);
      } catch (error) {
        setStatus("Failed to load geocoded JSON.");
        console.error(error);
        return;
      }

      const bounds = new google.maps.LatLngBounds();
      let markerCount = 0;

      for (const location of locations) {
        if (
          typeof location.lat !== "number" ||
          typeof location.lng !== "number"
        ) {
          console.warn("Skipping invalid location:", location);
          continue;
        }

        const marker = new google.maps.Marker({
          map: map,
          position: { lat: location.lat, lng: location.lng },
          title: location.address
        });

        const infoWindow = new google.maps.InfoWindow({
          content: buildInfoWindowContent(location)
        });

        marker.addListener("click", () => {
          infoWindow.open(map, marker);
        });

        bounds.extend(marker.getPosition());
        markerCount++;
      }

      if (markerCount > 0) {
        map.fitBounds(bounds);

        google.maps.event.addListenerOnce(map, "bounds_changed", function () {
          if (map.getZoom() > 15) {
            map.setZoom(15);
          }
        });
      }

      setStatus(`Loaded ${markerCount} map pins from precomputed coordinates.`);
    }

    loadGoogleMaps();
  </script>
</body>
</html>
