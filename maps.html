<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Customer Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }

    #map {
      height: 80vh;
      width: 100%;
      border-radius: 12px;
    }

    #status {
      margin-bottom: 12px;
      padding: 10px 14px;
      background: #f3f4f6;
      border-radius: 10px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <h2>Customer Tip Map</h2>
  <div id="status">Loading map…</div>
  <div id="map"></div>

  <script>
    function setStatus(text) {
      document.getElementById("status").textContent = text;
      console.log(text);
    }

    function loadGoogleMaps() {
      const script = document.createElement("script");
      script.src = "https://maps.googleapis.com/maps/api/js?key=YOUR_REAL_API_KEY_HERE&v=weekly";
      script.defer = true;
      script.onload = initMap;
      document.head.appendChild(script);
    }

    function getCustomerArray(jsonData) {
      // Case 1: file is already a plain array
      if (Array.isArray(jsonData)) {
        return jsonData;
      }

      // Case 2: wrapped object with common property names
      if (jsonData && typeof jsonData === "object") {
        if (Array.isArray(jsonData.customers)) return jsonData.customers;
        if (Array.isArray(jsonData.data)) return jsonData.data;
        if (Array.isArray(jsonData.customerList)) return jsonData.customerList;
        if (Array.isArray(jsonData.list)) return jsonData.list;

        // fallback: find the first array property in the object
        for (const key in jsonData) {
          if (Array.isArray(jsonData[key])) {
            console.log("Using array found in property:", key);
            return jsonData[key];
          }
        }
      }

      return [];
    }

    async function initMap() {
      setStatus("Map loaded. Creating map...");

      const map = new google.maps.Map(document.getElementById("map"), {
        center: { lat: 44.091, lng: -87.657 },
        zoom: 12
      });

      const geocoder = new google.maps.Geocoder();

      let rawJson;
      let customers = [];

      try {
        const response = await fetch("data/Customers6.json");
        if (!response.ok) {
          throw new Error("Failed to fetch Customers6.json: " + response.status);
        }

        rawJson = await response.json();
        console.log("Raw JSON loaded:", rawJson);

        customers = getCustomerArray(rawJson);

        setStatus(`Loaded ${customers.length} customers from JSON.`);
        console.log("Customer array being used:", customers);
      } catch (error) {
        setStatus("JSON failed to load. Check file path or JSON format.");
        console.error(error);
        return;
      }

      if (!customers.length) {
        setStatus("JSON loaded, but no customer array was found.");
        console.warn("Loaded JSON did not contain a usable array:", rawJson);
        return;
      }

      let successCount = 0;
      let failCount = 0;

      for (const c of customers) {
        if (!c.address || !c.name) {
          console.warn("Skipping invalid customer record:", c);
          continue;
        }

        geocoder.geocode({ address: c.address }, (results, status) => {
          if (status === "OK" && results[0]) {
            const marker = new google.maps.Marker({
              map: map,
              position: results[0].geometry.location,
              title: c.name
            });

            const info = new google.maps.InfoWindow({
              content: `
                <div>
                  <strong>${c.name}</strong><br>
                  Average Tip: $${Number(c.average_tip || 0).toFixed(2)}<br>
                  Address: ${c.address}
                </div>
              `
            });

            marker.addListener("click", () => {
              info.open(map, marker);
            });

            successCount++;
            setStatus(`Pins added: ${successCount} | Failed geocodes: ${failCount}`);
          } else {
            failCount++;
            console.warn("Geocode failed for:", c.address, "Status:", status);
            setStatus(`Pins added: ${successCount} | Failed geocodes: ${failCount}`);
          }
        });
      }
    }

    loadGoogleMaps();
  </script>
</body>
</html>
