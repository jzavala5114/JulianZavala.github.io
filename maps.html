<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Customer Tip Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }

    h2 {
      margin-bottom: 10px;
    }

    #status {
      margin-bottom: 12px;
      padding: 10px 14px;
      background: #f3f4f6;
      border-radius: 10px;
      font-size: 14px;
    }

    #map {
      height: 80vh;
      width: 100%;
      border-radius: 12px;
    }

    .info-window {
      max-width: 280px;
      font-size: 14px;
      line-height: 1.4;
    }

    .info-window h3 {
      margin: 0 0 8px 0;
      font-size: 16px;
    }

    .info-window .address {
      margin-bottom: 8px;
      color: #444;
    }

    .info-window .customer {
      margin-bottom: 6px;
    }

    .info-window .customer-address {
      font-size: 12px;
      color: #666;
      margin-top: 2px;
    }
  </style>
</head>
<body>
  <h2>Customer Tip Map</h2>
  <div id="status">Loading map...</div>
  <div id="map"></div>

  <script>
    const detailedIconCache = new Map();
    let openInfoWindow = null;
    let currentMarkers = [];
    let currentMarkerMode = null;
    let mapInstance = null;
    let regroupedLocationsCache = [];

    const DETAIL_ZOOM_THRESHOLD = 20;

    function setStatus(text) {
      document.getElementById("status").textContent = text;
      console.log(text);
    }

    function getDetailedMarkerIcon(count) {
      const displayText = count < 100 ? String(count) : "99+";
      const size = count >= 10 ? 44 : count >= 5 ? 40 : 36;

      const cacheKey = `${displayText}-${size}`;
      if (detailedIconCache.has(cacheKey)) {
        return detailedIconCache.get(cacheKey);
      }

      const radius = size / 2;
      const fontSize = count >= 10 ? 14 : 13;

      const svg = `
        <svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
          <circle cx="${radius}" cy="${radius}" r="${radius - 2}" fill="#d93025" stroke="#b3261e" stroke-width="2"/>
          <text x="50%" y="50%" text-anchor="middle" dominant-baseline="central"
                font-family="Arial, sans-serif" font-size="${fontSize}" font-weight="bold" fill="white">
            ${displayText}
          </text>
        </svg>
      `.trim();

      const icon = {
        url: "data:image/svg+xml;charset=UTF-8," + encodeURIComponent(svg),
        scaledSize: new google.maps.Size(size, size),
        anchor: new google.maps.Point(radius, radius)
    };

  detailedIconCache.set(cacheKey, icon);
  return icon;
}
    
    function loadGoogleMaps() {
      const script = document.createElement("script");
      script.src = "https://maps.googleapis.com/maps/api/js?key=AIzaSyDECF7ZPTKhkDOtwzWOWL4nEtqlXxsnLI4&v=weekly";
      script.async = true;
      script.defer = true;
      script.onload = initMap;
      document.head.appendChild(script);
    }

    function escapeHtml(text) {
      return String(text ?? "").replace(/[&<>"']/g, function(match) {
        const escapeMap = {
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          "\"": "&quot;",
          "'": "&#039;"
        };
        return escapeMap[match];
      });
    }

    function normalizeBuildingAddress(address) {
      if (!address) return "";

      let a = address.trim().toLowerCase();

      a = a.replace(/[.,#]/g, " ");

      a = a.replace(/\bsouth\b/g, "s");
      a = a.replace(/\bnorth\b/g, "n");
      a = a.replace(/\beast\b/g, "e");
      a = a.replace(/\bwest\b/g, "w");

      a = a.replace(/\bstreet\b/g, "st");
      a = a.replace(/\bavenue\b/g, "ave");
      a = a.replace(/\bboulevard\b/g, "blvd");
      a = a.replace(/\bdrive\b/g, "dr");
      a = a.replace(/\broad\b/g, "rd");
      a = a.replace(/\bplace\b/g, "pl");
      a = a.replace(/\bcourt\b/g, "ct");
      a = a.replace(/\bcircle\b/g, "cir");
      a = a.replace(/\blane\b/g, "ln");
      a = a.replace(/\bterrace\b/g, "ter");
      a = a.replace(/\bhighway\b/g, "hwy");

      // Remove apartment/unit-like segments
      a = a.replace(/\b(apartment|apt|unit|ste|suite|room|rm|lot)\s*[a-z0-9-]+\b/g, "");

      // Remove lonely single-letter unit after street type, like:
      // "710 saint clair st a manitowoc" -> "710 saint clair st manitowoc"
      a = a.replace(/\b(st|ave|blvd|dr|rd|pl|ct|cir|ln|ter|hwy)\s+[a-z]\b/g, "$1");

      a = a.replace(/\s+/g, " ").trim();

      return a;
    }

    function toTitleCaseAddress(address) {
      return address
        .split(" ")
        .filter(Boolean)
        .map(word => {
          if (word.length === 1) return word.toUpperCase();
          return word.charAt(0).toUpperCase() + word.slice(1);
        })
        .join(" ");
    }

    function buildInfoWindowContent(location) {
      const customerLines = location.customers
        .map(c => {
          const avg = Number(c.average_tip || 0).toFixed(2);
          const fullAddress = c.address
            ? `<div class="customer-address">${escapeHtml(c.address)}</div>`
            : "";

          return `
            <div class="customer">
              <strong>${escapeHtml(c.name)}</strong> — $${avg}
              ${fullAddress}
            </div>
          `;
        })
        .join("");

      return `
        <div class="info-window">
          <h3>${location.customers.length} Customer${location.customers.length === 1 ? "" : "s"}</h3>
          <div class="address">${escapeHtml(location.address)}</div>
          ${customerLines}
        </div>
      `;
    }

    function regroupLocationsByBuilding(locations) {
      const grouped = new Map();

      for (const location of locations) {
        if (typeof location.lat !== "number" || typeof location.lng !== "number") {
          console.warn("Skipping invalid location:", location);
          continue;
        }

        const originalAddress = location.address || "";
        const buildingKey = normalizeBuildingAddress(originalAddress);

        if (!buildingKey) {
          console.warn("Skipping location with empty normalized address:", location);
          continue;
        }

        if (!grouped.has(buildingKey)) {
          grouped.set(buildingKey, {
            address: toTitleCaseAddress(buildingKey),
            customers: [],
            latSum: 0,
            lngSum: 0,
            pointCount: 0
          });
        }

        const group = grouped.get(buildingKey);

        if (Array.isArray(location.customers)) {
          group.customers.push(...location.customers);
        } else {
          console.warn("Location missing customers array:", location);
        }

        group.latSum += location.lat;
        group.lngSum += location.lng;
        group.pointCount += 1;
      }

      return Array.from(grouped.values()).map(group => {
        group.customers.sort((a, b) => {
          const aAddress = String(a.address || "").toLowerCase();
          const bAddress = String(b.address || "").toLowerCase();
          return aAddress.localeCompare(bAddress);
        });

        return {
          address: group.address,
          customers: group.customers,
          lat: group.latSum / group.pointCount,
          lng: group.lngSum / group.pointCount
        };
      });
    }

    function clearMarkers() {
      for (const marker of currentMarkers) {
        marker.setMap(null);
      }
      currentMarkers = [];
    }

    function attachInfoWindow(marker, location) {
      marker.addListener("click", () => {
        if (openInfoWindow) {
          openInfoWindow.close();
        }

        openInfoWindow = new google.maps.InfoWindow({
          content: buildInfoWindowContent(location)
        });

        openInfoWindow.open(mapInstance, marker);
      });
    }

    function createSimpleMarker(location) {
      const marker = new google.maps.Marker({
        map: mapInstance,
        position: { lat: location.lat, lng: location.lng },
        title: `${location.address} (${location.customers.length} customer${location.customers.length === 1 ? "" : "s"})`
      });

      attachInfoWindow(marker, location);
      return marker;
    }

    function createDetailedMarker(location) {
      const count = Array.isArray(location.customers) ? location.customers.length : 0;

      const marker = new google.maps.Marker({
          map: mapInstance,
          position: { lat: location.lat, lng: location.lng },
          title: `${location.address} (${count} customer${count === 1 ? "" : "s"})`,
          icon: getDetailedMarkerIcon(count)
         });

        attachInfoWindow(marker, location);
        return marker;
      }

    function renderMarkersForCurrentZoom() {
      if (!mapInstance || !regroupedLocationsCache.length) return;

      const zoom = mapInstance.getZoom();
      const newMode = zoom >= DETAIL_ZOOM_THRESHOLD ? "detailed" : "simple";

      if (newMode === currentMarkerMode) {
        return;
      }

      currentMarkerMode = newMode;
      clearMarkers();

      console.time("render markers");

      for (const location of regroupedLocationsCache) {
        if (typeof location.lat !== "number" || typeof location.lng !== "number") {
          continue;
        }

        const marker =
          newMode === "detailed"
            ? createDetailedMarker(location)
            : createSimpleMarker(location);

        currentMarkers.push(marker);
      }

      console.timeEnd("render markers");

      setStatus(
        `Loaded ${currentMarkers.length} map pins. Mode: ${newMode}. Zoom: ${zoom}.`
      );
    }

    async function initMap() {
      console.time("total initMap");

      setStatus("Map loaded. Loading precomputed coordinates...");

      mapInstance = new google.maps.Map(document.getElementById("map"), {
        center: { lat: 44.091, lng: -87.657 },
        zoom: 12
      });

      let locations = [];

      try {
        console.time("fetch json");
        const response = await fetch("data/Customers6_geocoded.json");
        if (!response.ok) {
          throw new Error("Failed to fetch Customers6_geocoded.json: " + response.status);
        }

        locations = await response.json();
        console.timeEnd("fetch json");

        setStatus(`Loaded ${locations.length} geocoded address groups.`);
        console.log("Original geocoded locations:", locations);
      } catch (error) {
        setStatus("Failed to load geocoded JSON.");
        console.error(error);
        return;
      }

      console.time("regroup locations");
      regroupedLocationsCache = regroupLocationsByBuilding(locations);
      console.timeEnd("regroup locations");

      console.log("Regrouped locations:", regroupedLocationsCache);
      console.log("Original location count:", locations.length);
      console.log("Regrouped marker count:", regroupedLocationsCache.length);

      const bounds = new google.maps.LatLngBounds();
      for (const location of regroupedLocationsCache) {
        if (typeof location.lat === "number" && typeof location.lng === "number") {
          bounds.extend({ lat: location.lat, lng: location.lng });
        }
      }

      if (!bounds.isEmpty()) {
        console.time("fit bounds");
        mapInstance.fitBounds(bounds);

        google.maps.event.addListenerOnce(mapInstance, "bounds_changed", function() {
          if (mapInstance.getZoom() > 15) {
            mapInstance.setZoom(15);
          }
        });
        console.timeEnd("fit bounds");
      }

      renderMarkersForCurrentZoom();

      mapInstance.addListener("zoom_changed", () => {
        renderMarkersForCurrentZoom();
      });

      console.timeEnd("total initMap");
    }

    loadGoogleMaps();
  </script>
</body>
</html>
